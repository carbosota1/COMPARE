name: Run All Systems + Cross Analyzer

on:
  workflow_dispatch:

jobs:
  trigger-systems:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger LotMix
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/carbosota1/LOTMIX/actions/workflows/lottery-runner.yml/dispatches \
          -d '{"ref":"main"}'

      - name: Trigger UPDATELOTMIX
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/carbosota1/UPDATELOTMIX/actions/workflows/lottery-runner.yml/dispatches \
          -d '{"ref":"main"}'

      - name: Trigger COMPARE
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/carbosota1/COMPARE/actions/workflows/lottery-runner.yml/dispatches \
          -d '{"ref":"main"}'

      - name: Trigger CLAUDE-LOTMIX
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/carbosota1/CLAUDE-LOTMIX/actions/workflows/claude_lotmix.yml/dispatches \
          -d '{"ref":"main"}'

  wait-for-results:
    runs-on: ubuntu-latest
    needs: trigger-systems

    steps:
      - name: Wait for systems
        run: sleep 180

  cross-analyzer:
    runs-on: ubuntu-latest
    needs: wait-for-results

    steps:
      - name: Download COMPARE picks
        run: |
          curl -L -f -o compare.json https://raw.githubusercontent.com/carbosota1/COMPARE/main/outputs/picks.json

      - name: Download UPDATELOTMIX picks
        run: |
          curl -L -f -o update.json https://raw.githubusercontent.com/carbosota1/UPDATELOTMIX/main/outputs/picks.json

      - name: Download LOTMIX picks
        run: |
          curl -L -f -o lotmix.json https://raw.githubusercontent.com/carbosota1/LOTMIX/main/outputs/picks.json

      - name: Download CLAUDE-LOTMIX state
        run: |
          curl -L -f -o claude.json https://raw.githubusercontent.com/carbosota1/CLAUDE-LOTMIX/main/data/state.json

      - name: Install requests
        run: pip install requests

      - name: Run Cross Analyzer + Telegram
        env:
          TELEGRAM_BOT_TOKEN2: ${{ secrets.TELEGRAM_BOT_TOKEN2 }}
          TELEGRAM_CHAT_ID2: ${{ secrets.TELEGRAM_CHAT_ID2 }}
        run: |
          python <<'EOF'
          import json
          import os
          import requests
          from collections import Counter, defaultdict

          FILES = [
              ("COMPARE", "compare.json"),
              ("UPDATELOTMIX", "update.json"),
              ("LOTMIX", "lotmix.json"),
              ("CLAUDE-LOTMIX", "claude.json")
          ]

          def normalize_num(x):
              return str(x).strip().zfill(2)

          def safe_load(path):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      txt = f.read().strip()

                  if not txt:
                      print(f"⚠️ {path} vacío")
                      return {}

                  if txt.startswith("<"):
                      print(f"⚠️ {path} devolvió HTML, no JSON")
                      return {}

                  return json.loads(txt)

              except Exception as e:
                  print(f"❌ Error leyendo {path}: {e}")
                  return {}

          def extract_numbers(system_name, data):
              top3 = []
              top12 = []

              if not isinstance(data, dict):
                  return top3, top12

              # Formato normal: outputs/picks.json
              top3 = data.get("top3", []) or data.get("topq", [])
              top12 = data.get("top12", [])

              # Formato con best_play
              best_play = data.get("best_play", {})
              if isinstance(best_play, dict):
                  top3 = best_play.get("top3", []) or best_play.get("topq", []) or top3
                  top12 = best_play.get("top12", []) or top12

              # Formato CLAUDE-LOTMIX: data/state.json
              if system_name == "CLAUDE-LOTMIX":
                  top12 = data.get("last_top12", []) or top12
                  top3 = top12[:3]

              top3 = [normalize_num(n) for n in top3]
              top12 = [normalize_num(n) for n in top12]

              return top3, top12

          numbers = []
          sources = defaultdict(list)
          system_details = []

          for system_name, file_path in FILES:
              data = safe_load(file_path)
              top3, top12 = extract_numbers(system_name, data)

              all_nums = list(dict.fromkeys(top3 + top12))

              system_details.append({
                  "system": system_name,
                  "top3": top3,
                  "top12": top12
              })

              for n in all_nums:
                  numbers.append(n)
                  sources[n].append(system_name)

          counts = Counter(numbers)

          signals = []
          for n, c in counts.items():
              if c >= 2:
                  signals.append((n, c, sources[n]))

          signals.sort(key=lambda x: (-x[1], x[0]))

          if signals:
              msg = "🔥 SUPER SIGNALS — LOTMIX META ENGINE 🔥\n\n"

              for n, c, systems in signals:
                  if c >= 4:
                      decision = "🚀 JUGAR AGRESIVO — 4 SISTEMAS"
                  elif c == 3:
                      decision = "🔥 JUGAR FUERTE — 3 SISTEMAS"
                  else:
                      decision = "✅ JUGAR — 2 SISTEMAS"

                  msg += f"🎯 Número: {n}\n"
                  msg += f"📡 Coincidencia: {c} sistemas\n"
                  msg += f"🧠 Sistemas: {', '.join(systems)}\n"
                  msg += f"⚡ Decisión: {decision}\n\n"

              msg += "━━━━━━━━━━━━━━\n"
              msg += "📊 RESUMEN POR SISTEMA\n\n"

          else:
              msg = "❌ NO JUGAR — SIN SUPER SIGNAL\n\n"
              msg += "No hay coincidencia mínima de 2 sistemas.\n\n"
              msg += "📊 RESUMEN POR SISTEMA\n\n"

          for item in system_details:
              msg += f"🔹 {item['system']}\n"
              msg += f"Top3: {', '.join(item['top3']) if item['top3'] else 'N/A'}\n"
              msg += f"Top12: {', '.join(item['top12'][:12]) if item['top12'] else 'N/A'}\n\n"

          token = os.environ.get("TELEGRAM_BOT_TOKEN2")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID2")

          if not token or not chat_id:
              print("❌ Faltan TELEGRAM_BOT_TOKEN2 o TELEGRAM_CHAT_ID2")
              print(msg)
              raise SystemExit(1)

          response = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data={
                  "chat_id": chat_id,
                  "text": msg
              },
              timeout=20
          )

          print(msg)
          print("Telegram status:", response.status_code)
          print(response.text)
          EOF